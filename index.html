<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Braginski's Igrovoy's</title>
</head>
<body>

<script>
  const sourceURL = "https://raw.githubusercontent.com/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor/refs/heads/master/index.html";

  fetch(sourceURL)
    .then(response => response.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      document.body.innerHTML = "<h1>Failed to load content</h1>";
      console.error(err);
    });
</script>

</body>
</html>
